<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wish Jar</title>
    <style>
      body {
        background-color: #ffe5f4;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
      }

      h1 {
        font-family: Trattatello, fantasy;
        color: #ff89a9;
        font-size: 70px;
        margin-bottom: 20px;
        text-align: center;
      }

      .note-container {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 20px;
        margin-top: 20px;
      }

      .note {
        background-color: #fff5f9;
        border: 2px solid #ff89a9;
        border-radius: 10px;
        padding: 15px;
        width: 150px;
        height: 150px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        font-family: URW Chancery L, cursive;
        font-size: 20px;
        color: #ff89a9;
      }

      .btn {
        padding: 15px 30px;
        font-size: 20px;
        background-color: #ff89a9;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin-top: 20px;
        transition: transform 0.2s ease;
      }

      .btn:hover {
        transform: scale(1.1);
      }

      .btn:active {
        transform: scale(1.2);
      }
    </style>
  </head>
  <body>
    <h1>My Wish Jar</h1>
    <div class="note-container">
      <div class="note">Travel around the world with you</div>
      <div class="note">Picnic date</div>
      <div class="note"></div>
      <div class="note"></div>
      <div class="note"></div>
      <div class="note"></div>
      <div class="note"></div>
      <div class="note"></div>
      <div class="note"></div>
      <div class="note"></div>
      <div class="note"></div>
      <div class="note"></div>
      <div class="note"></div>
      <div class="note"></div>
      <div class="note"></div>
      <div class="note"></div>
      <div class="note"></div>
      <div class="note"></div>
    </div>
    <button class="btn" onclick="window.location.href='mainPage.html'">Back to Main</button>
  </body>
</html>
